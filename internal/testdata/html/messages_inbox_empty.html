<!DOCTYPE html>
<html lang="en">
<head><title>Messages | Schoology</title></head>
<body>
<div id="main-inner">
  <h1>Messages</h1>
  <ul class="s-messages-folder-tabs">
    <li><a href="/messages">Inbox</a> <span class="tab-selected">Tab - Selected</span></li>
    <li><a href="/messages/sent">Sent Messages</a></li>
  </ul>
  <table class="sSortable messages-table">
    <thead>
      <tr>
        <th><a href="/messages?sort=asc&amp;order=Subject">Subject</a></th>
        <th>From</th>
        <th>Date</th>
      </tr>
    </thead>
    <tbody>
      <tr class="empty-state">
        <td colspan="3">There are no available inbox messages.</td>
      </tr>
    </tbody>
  </table>
</div>
</body>
</html>
